<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaAudit — Password Risk Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #0f1318;
      --panel:     #141920;
      --border:    #1e2730;
      --accent:    #00e5ff;
      --accent2:   #ff3c5f;
      --accent3:   #39ff14;
      --text:      #cdd6e0;
      --muted:     #4a5568;
      --warning:   #ffb703;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .header {
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-icon {
      width: 36px; height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 18px;
      box-shadow: 0 0 12px rgba(0,229,255,0.25);
    }
    .header-title { font-family: var(--sans); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
    .header-title span { color: var(--accent); }
    .header-badge {
      margin-left: auto; font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px;
    }

    .main {
      max-width: 1100px; margin: 0 auto;
      padding: 40px 24px 80px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .main { grid-template-columns: 1fr; }
      .header { padding: 16px 20px; }
    }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .panel-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: var(--panel);
    }
    .panel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .panel-dot.red   { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    .panel-dot.green { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
    .panel-title { font-family: var(--sans); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text); }
    .panel-body { padding: 20px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 12px;
      font-family: var(--mono); font-size: 13px; color: var(--text);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
    .field input::placeholder { color: var(--muted); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .options-row { display: flex; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
    .toggle-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; user-select: none; }
    .toggle-label input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }

    .btn-generate {
      width: 100%; background: var(--accent); color: #000; border: none;
      border-radius: 6px; padding: 12px;
      font-family: var(--sans); font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .btn-generate:hover:not(:disabled) { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }
    .btn-generate:active:not(:disabled) { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-bar { height: 2px; background: var(--border); border-radius: 2px; margin-top: 14px; overflow: hidden; }
    .loading-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: loading 1.4s ease-in-out infinite; box-shadow: 0 0 8px var(--accent); }
    @keyframes loading {
      0%   { width: 0%; margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    .error-box { background: rgba(255,60,95,0.08); border: 1px solid rgba(255,60,95,0.3); border-radius: 6px; padding: 12px 14px; font-size: 12px; color: var(--accent2); margin-top: 12px; display: flex; align-items: center; gap: 8px; }

    .stats-bar { display: flex; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-family: var(--sans); font-size: 22px; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
    .stat-divider { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }

    .pwd-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; padding: 16px 20px; max-height: 360px; overflow-y: auto; }
    .pwd-grid::-webkit-scrollbar { width: 4px; }
    .pwd-grid::-webkit-scrollbar-track { background: var(--panel); }
    .pwd-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .pwd-chip { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-size: 11px; color: var(--text); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: border-color 0.15s, color 0.15s; cursor: default; }
    .pwd-chip:hover { border-color: var(--accent); color: var(--accent); }

    .search-wrap { padding: 20px; }
    .search-input-row { display: flex; gap: 10px; }
    .search-input-row input { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-input-row input:focus { border-color: var(--accent); }
    .search-input-row input::placeholder { color: var(--muted); }
    .btn-check { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; padding: 10px 18px; font-family: var(--mono); font-size: 12px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .btn-check:hover { background: rgba(0,229,255,0.08); }
    .btn-check:disabled { opacity: 0.35; cursor: not-allowed; }

    .search-result { margin-top: 14px; border-radius: 6px; padding: 12px 16px; font-size: 12px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.5; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .search-result.found { background: rgba(255,183,3,0.07); border: 1px solid rgba(255,183,3,0.3); color: var(--warning); }
    .search-result.not-found { background: rgba(57,255,20,0.06); border: 1px solid rgba(57,255,20,0.25); color: var(--accent3); }
    .search-result-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

    .disclaimer { margin: 0 0 24px; background: rgba(255,183,3,0.05); border: 1px solid rgba(255,183,3,0.2); border-radius: 8px; padding: 12px 16px; font-size: 11px; color: var(--warning); line-height: 1.6; display: flex; gap: 10px; align-items: flex-start; grid-column: 1 / -1; }

    .empty-state { padding: 48px 20px; text-align: center; color: var(--muted); font-size: 12px; line-height: 2; }
    .empty-state-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

    .btn-download { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 6px 12px; font-family: var(--mono); font-size: 11px; cursor: pointer; transition: border-color 0.2s, color 0.2s; margin: 0 20px 16px; }
    .btn-download:hover { border-color: var(--accent); color: var(--accent); }

    .right-col { display: flex; flex-direction: column; gap: 24px; }

    .footer { text-align: center; padding: 32px; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid var(--border); grid-column: 1 / -1; }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;
    const API_URL = "http://localhost:5000/generate";

    function App() {
      const [form, setForm] = useState({
        first_name: "", last_name: "", nickname: "",
        pet_name: "", city: "", birth_year: "", keywords: "",
      });
      const [options, setOptions] = useState({ leet: true, numbers: true });
      const [loading, setLoading]       = useState(false);
      const [error, setError]           = useState(null);
      const [result, setResult]         = useState(null);
      const [search, setSearch]         = useState("");
      const [searchResult, setSearchResult] = useState(null);
      const allPasswords = useRef([]);

      const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));

      const handleGenerate = async () => {
        if (!form.first_name.trim() || !form.last_name.trim()) {
          setError("First name and last name are required.");
          return;
        }
        setError(null); setResult(null); setSearchResult(null); setSearch("");
        setLoading(true);

        const payload = {
          first_name:     form.first_name.trim(),
          last_name:      form.last_name.trim(),
          nickname:       form.nickname.trim()   || null,
          pet_name:       form.pet_name.trim()   || null,
          city:           form.city.trim()       || null,
          birth_year:     form.birth_year.trim() || null,
          keywords:       form.keywords.trim()
                            ? form.keywords.split(",").map(k => k.trim()).filter(Boolean)
                            : [],
          enable_leet:    options.leet,
          enable_numbers: options.numbers,
          max_passwords:  5000,
        };

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `Server error ${res.status}`);
          }
          const data = await res.json();
          allPasswords.current = data.passwords;
          setResult({ count: data.count, preview: data.passwords.slice(0, 50) });
        } catch (e) {
          setError(e.message || "Failed to connect to backend. Is Flask running on port 5000?");
        } finally {
          setLoading(false);
        }
      };

      const handleCheck = () => {
        if (!search.trim() || allPasswords.current.length === 0) return;
        setSearchResult(allPasswords.current.includes(search.trim()) ? "found" : "not-found");
      };

      const handleDownload = () => {
        const blob = new Blob([allPasswords.current.join("\n")], { type: "text/plain" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "personaaudit_wordlist.txt"; a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <>
          <header className="header">
            <div className="header-icon">⚿</div>
            <div className="header-title">Persona<span>Audit</span></div>
            <div className="header-badge">Security Awareness Tool</div>
          </header>

          <div className="main">
            <div className="disclaimer">
              <span style={{fontSize:16,flexShrink:0}}>⚠</span>
              <span>
                <strong>Educational use only.</strong> Enter your own information to discover which passwords
                an attacker would likely guess about you. Never use any password that appears in the
                generated list. Inspired by <strong>OWASP A07</strong> — Identification and Authentication Failures.
              </span>
            </div>

            {/* ── FORM ── */}
            <div className="panel">
              <div className="panel-header">
                <div className="panel-dot"></div>
                <span className="panel-title">Target Profile</span>
              </div>
              <div className="panel-body">
                <div className="field-row">
                  <div className="field">
                    <label>First Name *</label>
                    <input name="first_name" value={form.first_name} onChange={handleChange} placeholder="john" />
                  </div>
                  <div className="field">
                    <label>Last Name *</label>
                    <input name="last_name" value={form.last_name} onChange={handleChange} placeholder="smith" />
                  </div>
                </div>
                <div className="field-row">
                  <div className="field">
                    <label>Nickname</label>
                    <input name="nickname" value={form.nickname} onChange={handleChange} placeholder="johnny" />
                  </div>
                  <div className="field">
                    <label>Pet Name</label>
                    <input name="pet_name" value={form.pet_name} onChange={handleChange} placeholder="rex" />
                  </div>
                </div>
                <div className="field-row">
                  <div className="field">
                    <label>City / Location</label>
                    <input name="city" value={form.city} onChange={handleChange} placeholder="casablanca" />
                  </div>
                  <div className="field">
                    <label>Birth Year</label>
                    <input name="birth_year" value={form.birth_year} onChange={handleChange} placeholder="1999" maxLength={4} />
                  </div>
                </div>
                <div className="field">
                  <label>Extra Keywords (comma-separated)</label>
                  <input name="keywords" value={form.keywords} onChange={handleChange} placeholder="barcelona, google, arsenal" />
                </div>

                <div className="options-row">
                  <label className="toggle-label">
                    <input type="checkbox" checked={options.leet}
                      onChange={e => setOptions(o => ({ ...o, leet: e.target.checked }))} />
                    Leetspeak variants
                  </label>
                  <label className="toggle-label">
                    <input type="checkbox" checked={options.numbers}
                      onChange={e => setOptions(o => ({ ...o, numbers: e.target.checked }))} />
                    Number suffixes
                  </label>
                </div>

                <button className="btn-generate" onClick={handleGenerate} disabled={loading}>
                  {loading ? "Generating..." : "⚡ Generate Passwords"}
                </button>

                {loading && <div className="loading-bar"><div className="loading-bar-fill"></div></div>}
                {error   && <div className="error-box"><span>✕</span> {error}</div>}
              </div>
            </div>

            {/* ── RIGHT COLUMN ── */}
            <div className="right-col">

              {/* Results */}
              <div className="panel">
                <div className="panel-header">
                  <div className="panel-dot red"></div>
                  <span className="panel-title">Generated Passwords</span>
                  {result && <span style={{marginLeft:"auto",fontSize:10,color:"var(--muted)"}}>showing first 50</span>}
                </div>

                {result ? (
                  <>
                    <div className="stats-bar">
                      <div className="stat">
                        <div className="stat-value">{result.count.toLocaleString()}</div>
                        <div className="stat-label">Total Generated</div>
                      </div>
                      <div className="stat-divider"></div>
                      <div className="stat">
                        <div className="stat-value">50</div>
                        <div className="stat-label">Displayed</div>
                      </div>
                      <div className="stat-divider"></div>
                      <div className="stat">
                        <div className="stat-value" style={{color:"var(--accent2)"}}>HIGH</div>
                        <div className="stat-label">Risk Level</div>
                      </div>
                    </div>
                    <div className="pwd-grid">
                      {result.preview.map((p, i) => (
                        <div key={i} className="pwd-chip" title={p}>{p}</div>
                      ))}
                    </div>
                    <button className="btn-download" onClick={handleDownload}>
                      ↓ Download full list (.txt)
                    </button>
                  </>
                ) : (
                  <div className="empty-state">
                    <div className="empty-state-icon">🔐</div>
                    Fill in the profile and click<br />
                    <strong style={{color:"var(--accent)"}}>Generate Passwords</strong><br />
                    to see your risk list.
                  </div>
                )}
              </div>

              {/* Search */}
              <div className="panel">
                <div className="panel-header">
                  <div className="panel-dot green"></div>
                  <span className="panel-title">Password Risk Check</span>
                </div>
                <div className="search-wrap">
                  <p style={{fontSize:11,color:"var(--muted)",marginBottom:14,lineHeight:1.6}}>
                    Check if one of your passwords appears in the generated list.
                    Done entirely client-side — nothing is sent to any server.
                  </p>
                  <div className="search-input-row">
                    <input
                      type="text"
                      placeholder="Enter a password to check..."
                      value={search}
                      onChange={e => { setSearch(e.target.value); setSearchResult(null); }}
                      onKeyDown={e => e.key === "Enter" && handleCheck()}
                    />
                    <button className="btn-check" onClick={handleCheck} disabled={!result || !search.trim()}>
                      Check
                    </button>
                  </div>

                  {searchResult === "found" && (
                    <div className="search-result found">
                      <span className="search-result-icon">⚠️</span>
                      <div>
                        <strong>Danger: Predictable password detected.</strong><br />
                        "<code style={{fontSize:12}}>{search}</code>" appears in the generated list.
                        Change this password immediately and avoid anything derived from your personal info.
                      </div>
                    </div>
                  )}
                  {searchResult === "not-found" && (
                    <div className="search-result not-found">
                      <span className="search-result-icon">✅</span>
                      <div>
                        <strong>Not found in the generated list.</strong><br />
                        "<code style={{fontSize:12}}>{search}</code>" was not predicted from your personal info.
                        Still make sure it meets strong password guidelines.
                      </div>
                    </div>
                  )}
                  {!result && (
                    <p style={{fontSize:11,color:"var(--muted)",marginTop:12,fontStyle:"italic"}}>
                      Generate passwords first to enable this check.
                    </p>
                  )}
                </div>
              </div>

            </div>{/* end right-col */}

            <div className="footer">
              PersonaAudit · Security Awareness Tool ·&nbsp;
              <a href="https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/" target="_blank">OWASP A07</a>
              &nbsp;·&nbsp;
              <a href="https://pages.nist.gov/800-63-3/sp800-63b.html" target="_blank">NIST SP 800-63B</a>
            </div>

          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
